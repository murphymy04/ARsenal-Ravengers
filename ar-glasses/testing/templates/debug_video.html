<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AR Glasses — diarization debug</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0c0c0f;
    color: #e6e6e6;
    display: grid;
    grid-template-columns: 1fr 420px;
    grid-template-rows: 100vh;
  }
  .video {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    min-width: 0;
  }
  .video img {
    max-width: 100%;
    max-height: calc(100vh - 100px);
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
  }
  .side {
    display: grid;
    grid-template-rows: 1fr 1fr;
    border-left: 1px solid #1f1f25;
    min-width: 0;
  }
  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-bottom: 1px solid #1f1f25;
  }
  .panel:last-child { border-bottom: none; }
  .panel h2 {
    margin: 0;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #8a8a94;
    background: #111115;
    border-bottom: 1px solid #1f1f25;
  }
  .panel .feed {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.5;
  }
  .caption {
    margin-bottom: 8px;
    padding: 8px 10px;
    background: #15151b;
    border-radius: 6px;
  }
  .caption .meta {
    font-size: 11px;
    color: #8a8a94;
    margin-bottom: 2px;
  }
  .caption .speaker { color: #6ea8ff; font-weight: 600; }
  .caption.wearer .speaker { color: #ffb347; }
  .retrieval {
    margin-bottom: 10px;
    padding: 10px;
    background: #15151b;
    border-radius: 6px;
  }
  .retrieval .name { color: #50d890; font-weight: 600; margin-bottom: 6px; }
  .retrieval ul { margin: 0; padding-left: 18px; }
  .retrieval li { margin: 2px 0; color: #cfcfd6; }
  .empty { color: #555; font-style: italic; }
  #status {
    font-size: 12px;
    color: #8a8a94;
  }
  audio { width: 100%; max-width: 720px; }
</style>
</head>
<body>
  <div class="video">
    <img src="/video" alt="diarization stream">
    {% if not fast %}
    <audio id="audio" src="/audio" autoplay controls></audio>
    {% endif %}
    <div id="status">processing…</div>
  </div>
  <div class="side">
    <div class="panel">
      <h2>Captions</h2>
      <div class="feed" id="captions"><div class="empty">waiting for first window flush…</div></div>
    </div>
    <div class="panel">
      <h2>Retrieval</h2>
      <div class="feed" id="retrieval"><div class="empty">no retrieval results yet</div></div>
    </div>
  </div>

<script>
const captionsEl = document.getElementById("captions");
const retrievalEl = document.getElementById("retrieval");
const statusEl = document.getElementById("status");
const audioEl = document.getElementById("audio");

function isPinnedToBottom(el, slack = 40) {
  return el.scrollHeight - el.scrollTop - el.clientHeight < slack;
}

function renderFeed(el, html) {
  const pinned = isPinnedToBottom(el);
  el.innerHTML = html;
  if (pinned) el.scrollTop = el.scrollHeight;
}

function renderCaptions(items) {
  if (!items.length) return;
  const html = items.map(c => {
    const wearer = c.speaker === "wearer" ? " wearer" : "";
    return `<div class="caption${wearer}">
      <div class="meta">${c.start.toFixed(2)}s – ${c.end.toFixed(2)}s</div>
      <div><span class="speaker">${c.speaker}</span>: ${escapeHtml(c.text)}</div>
    </div>`;
  }).join("");
  renderFeed(captionsEl, html);
}

function renderRetrieval(items) {
  if (!items.length) return;
  const html = items.map(r => {
    const facts = r.facts.map(f => `<li>${escapeHtml(f)}</li>`).join("");
    const pid = r.person_id != null ? ` <span style="color:#8a8a94">(id ${r.person_id})</span>` : "";
    return `<div class="retrieval">
      <div class="name">${escapeHtml(r.name)}${pid}</div>
      <ul>${facts}</ul>
    </div>`;
  }).join("");
  renderFeed(retrievalEl, html);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function syncAudio(data) {
  if (!audioEl) return;
  const rate = data.effective_rate;
  if (rate > 0.05) {
    const clamped = Math.max(0.25, Math.min(4.0, rate));
    if (Math.abs(audioEl.playbackRate - clamped) > 0.02) {
      audioEl.playbackRate = clamped;
    }
  }
  const drift = audioEl.currentTime - data.video_time;
  if (Math.abs(drift) > 1.5 && data.video_time > 0) {
    audioEl.currentTime = data.video_time;
  }
}

async function tick() {
  try {
    const res = await fetch("/state.json");
    const data = await res.json();
    renderCaptions(data.captions);
    renderRetrieval(data.retrieval);
    syncAudio(data);
    const ratePct = data.effective_rate > 0 ? ` · ${(data.effective_rate * 100).toFixed(0)}% realtime` : "";
    statusEl.textContent = data.finished
      ? `finished · ${data.captions.length} captions · ${data.retrieval.length} retrievals`
      : `streaming${ratePct} · ${data.captions.length} captions · ${data.retrieval.length} retrievals`;
  } catch (e) {
    statusEl.textContent = `error: ${e.message}`;
  }
}

setInterval(tick, 500);
tick();
</script>
</body>
</html>
