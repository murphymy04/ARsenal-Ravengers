services:
  neo4j:
    image: neo4j:5.26
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    environment:
      NEO4J_AUTH: neo4j/ravengers
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
